name: ⚙️ Generate policies.ts

on:
  push:
    branches: [ main ]
    paths:
      - 'policies/**/*.md'
      - '.github/scripts/generate_policies_ts.py'

jobs:
  generate:
    name: Generate policies.ts from Markdown files
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generator
        run: python .github/scripts/generate_policies_ts.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet dashboards/web-ui/src/lib/policies.ts || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated policies.ts
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "PolicyForge Bot"
          git config user.email "bot@policyforge.dev"
          git add dashboards/web-ui/src/lib/policies.ts
          git commit -m "chore(auto): regenerate policies.ts from Markdown sources [skip ci]"
          git push
